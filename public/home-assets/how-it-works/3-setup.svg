<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="wob" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#ffffff"/>

  <g filter="url(#wob)" stroke="#1E2A78" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <!-- cart body -->
    <rect x="48" y="104" width="104" height="52" rx="10" fill="#ffffff"/>
    <!-- serving counter ledge -->
    <rect x="42" y="96" width="116" height="13" rx="5" fill="#A9C4F5"/>
    <!-- awning top bar -->
    <rect x="40" y="72" width="120" height="11" rx="4" fill="#F4A8D8"/>
    <!-- scalloped striped tabs -->
    <path d="M40 83 V90 Q40 99 50 99 Q60 99 60 90 V83 Z" fill="#ffffff"/>
    <path d="M60 83 V90 Q60 99 70 99 Q80 99 80 90 V83 Z" fill="#F4A8D8"/>
    <path d="M80 83 V90 Q80 99 90 99 Q100 99 100 90 V83 Z" fill="#ffffff"/>
    <path d="M100 83 V90 Q100 99 110 99 Q120 99 120 90 V83 Z" fill="#F4A8D8"/>
    <path d="M120 83 V90 Q120 99 130 99 Q140 99 140 90 V83 Z" fill="#ffffff"/>
    <path d="M140 83 V90 Q140 99 150 99 Q160 99 160 90 V83 Z" fill="#F4A8D8"/>
    <!-- little ice-cream sign on top -->
    <path d="M93 66 L100 80 L107 66 Z" fill="#A9C4F5"/>
    <circle cx="100" cy="56" r="11" fill="#5B6FE0"/>
    <!-- wheels -->
    <circle cx="72" cy="164" r="14" fill="#5B6FE0"/>
    <circle cx="128" cy="164" r="14" fill="#5B6FE0"/>
    <circle cx="72" cy="164" r="4" fill="#1E2A78" stroke="none"/>
    <circle cx="128" cy="164" r="4" fill="#1E2A78" stroke="none"/>
  </g>

  <!-- face on cart body -->
  <g>
    <circle cx="84" cy="132" r="6.5" fill="#F4A8D8"/>
    <circle cx="116" cy="132" r="6.5" fill="#F4A8D8"/>
    <circle cx="92" cy="125" r="3.4" fill="#1E2A78"/>
    <circle cx="108" cy="125" r="3.4" fill="#1E2A78"/>
    <path d="M92 133 Q100 141 108 133" fill="none" stroke="#1E2A78" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- ambient sprinkles -->
  <g stroke-linecap="round" stroke-width="4.5">
    <path d="M26 96 l8 3" stroke="#5B6FE0"/>
    <path d="M30 150 l-3 9" stroke="#F4A8D8"/>
    <path d="M174 100 l-7 3" stroke="#A9C4F5"/>
    <path d="M176 150 l3 9" stroke="#5B6FE0"/>
    <path d="M100 30 l6 5" stroke="#F4A8D8"/>
  </g>
</svg>
